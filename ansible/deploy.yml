---
- name: Deploy SentinelCI demo stack
  hosts: app_hosts
  become: true
  collections:
    - community.docker
  vars:
    sentinelci_app_image: "docker.io/library/sentinelci-app:latest"
    sentinelci_proxy_image: "docker.io/library/sentinelci-proxy:latest"
    sentinelci_app_container: "sentinelci-app"
    sentinelci_proxy_container: "sentinelci-proxy"
    sentinelci_network: "sentinelci-network"
    sentinelci_app_port: 8000
    sentinelci_proxy_port: 8080

  tasks:
    - name: Install Docker engine requirements
      ansible.builtin.apt:
        name:
          - docker.io
          - python3-docker
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Create SentinelCI Docker network
      community.docker.docker_network:
        name: "{{ sentinelci_network }}"
        state: present

    - name: Pull latest SentinelCI app image
      community.docker.docker_image:
        name: "{{ sentinelci_app_image }}"
        source: pull

    - name: Pull latest SentinelCI proxy image
      community.docker.docker_image:
        name: "{{ sentinelci_proxy_image }}"
        source: pull

    - name: Run SentinelCI API container
      community.docker.docker_container:
        name: "{{ sentinelci_app_container }}"
        image: "{{ sentinelci_app_image }}"
        state: started
        restart_policy: unless-stopped
        recreate: true
        networks:
          - name: "{{ sentinelci_network }}"
        exposed_ports:
          - "{{ sentinelci_app_port }}"

    - name: Run SentinelCI proxy container
      community.docker.docker_container:
        name: "{{ sentinelci_proxy_container }}"
        image: "{{ sentinelci_proxy_image }}"
        state: started
        restart_policy: unless-stopped
        recreate: true
        networks:
          - name: "{{ sentinelci_network }}"
        published_ports:
          - "{{ sentinelci_proxy_port }}:80"
